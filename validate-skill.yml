name: validate-skill

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate skills
        run: |
          set -euo pipefail

          if git diff --name-only origin/main...HEAD | grep -q '^\.github/workflows/'; then
            echo "Skill upload PR cannot modify workflows"
            exit 1
          fi

          skill_files="$(find . -mindepth 2 -maxdepth 2 -name SKILL.md -print)"

          if [ -z "$skill_files" ]; then
            echo "No SKILL.md found"
            exit 1
          fi

          for file in $skill_files; do
            dir="$(dirname "$file")"
            case "$dir" in
              *..*|/*)
                echo "Invalid skill path: $dir"
                exit 1
                ;;
            esac

            grep -q '^---$' "$file"
            grep -q '^name:' "$file"
            grep -q '^description:' "$file"
          done
